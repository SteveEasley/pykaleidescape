name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate release tag matches package version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version="$(python -c "import kaleidescape; print(kaleidescape.__version__)")"
          if [[ "$tag" != "$pkg_version" ]]; then
            echo "Release tag version ($tag) does not match kaleidescape.__version__ ($pkg_version)."
            exit 1
          fi

      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
